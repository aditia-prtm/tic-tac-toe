<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
            <p class="tittle">TIC-TAC-TOE</p>

            <div class="score-container">
                <div class="first user">
                    <div class="usn">You</div>
                    <div class="score" id="first-score">0</div>
                </div>

                <div class="second user">                
                    <div class="score" id="second-score">0</div>
                    <div class="usn">Computer</div>
                </div>
            </div>
            <div class="board-container">

                <div class="first row">
                    <button type="button" id="first"></button>
                    <button type="button" id="second"></button>
                    <button type="button" id="third"></button>
                </div>
                
                <div class="second row">
                    <button type="button" id="fourth"></button>
                    <button type="button" id="fifth"></button>
                    <button type="button" id="sixth"></button>
                </div>
                
                <div class="third row">
                    <button type="button" id="seventh"></button>
                    <button type="button" id="eighth"></button>
                    <button type="button" id="ninth"></button>
                </div>
            </div>
            <div class="reset-container">
                <button type="button" id="reset">Reset</button>
            </div>
            <div class="result-container">
                <p id="result"></p>
            </div>
    </div>
    <footer>
        <p>© (2026) Made by Adit :v</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
